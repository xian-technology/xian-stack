name: Validate

on:
  push:
    branches:
      - "*"
  pull_request:
    branches:
      - "*"

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out xian-stack
        uses: actions/checkout@v4
        with:
          path: xian-stack

      - name: Check out xian-abci
        uses: actions/checkout@v4
        with:
          repository: xian-technology/xian-abci
          path: xian-abci

      - name: Check out xian-contracting
        uses: actions/checkout@v4
        with:
          repository: xian-technology/xian-contracting
          path: xian-contracting

      - name: Check out xian-py
        uses: actions/checkout@v4
        with:
          repository: xian-technology/xian-py
          path: xian-py

      - name: Check out xian-configs
        uses: actions/checkout@v4
        with:
          repository: xian-technology/xian-configs
          path: xian-configs

      - name: Validate stack
        working-directory: xian-stack
        run: ./scripts/validate-stack.sh

  smoke:
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 30

    steps:
      - name: Check out xian-stack
        uses: actions/checkout@v4
        with:
          path: xian-stack

      - name: Check out xian-abci
        uses: actions/checkout@v4
        with:
          repository: xian-technology/xian-abci
          path: xian-abci

      - name: Check out xian-contracting
        uses: actions/checkout@v4
        with:
          repository: xian-technology/xian-contracting
          path: xian-contracting

      - name: Check out xian-py
        uses: actions/checkout@v4
        with:
          repository: xian-technology/xian-py
          path: xian-py

      - name: Check out xian-configs
        uses: actions/checkout@v4
        with:
          repository: xian-technology/xian-configs
          path: xian-configs

      - name: Run stack smoke test
        working-directory: xian-stack
        run: ./scripts/smoke-stack.sh
