networks:
  xian-net:
    internal: false  # Allow internet access for package installation
  xian-db:
    internal: true   # Keep database isolated

services:
  abci:
    restart: always
    hostname: xian-stack
    build:
      context: .
      dockerfile: ./docker/abci.Dockerfile
    volumes:
      - ./xian-abci:/usr/src/app/xian-abci
      - ./xian-contracting:/usr/src/app/xian-abci/xian-contracting
      - ./.cometbft:/root/.cometbft
    stdin_open: true
    tty: true
    networks:
      - xian-net
      - xian-db
    ports:
      - "26657:26657"
      - "26656:26656"
      - "26660:26660"
    # network_mode: "host"
    command: >
      bash -c "pip install -e ./xian-abci && pip install -e ./xian-abci/xian-contracting && tail -f /dev/null"
