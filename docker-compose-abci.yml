networks:
  xian-net:
    internal: false  # Allow internet access for package installation
  xian-db:
    internal: true   # Keep database isolated

services:
  abci:
    restart: always
    hostname: xian-stack
    build:
      context: .
      dockerfile: ./docker/abci.Dockerfile
    volumes:
      - ${XIAN_ABCI_DIR}:/usr/src/app/xian-abci
      - ${XIAN_CONTRACTING_DIR}:/usr/src/app/xian-contracting
      - ${XIAN_PY_DIR}:/usr/src/app/xian-py
      - ${XIAN_COMETBFT_HOME}:/root/.cometbft
    stdin_open: true
    tty: true
    networks:
      - xian-net
      - xian-db
    ports:
      - "26657:26657"
      - "26656:26656"
      - "26660:26660"
    command: >
      bash -lc "pip install -e ./xian-py && pip install -e ./xian-contracting && pip install -e ./xian-abci && tail -f /dev/null"
