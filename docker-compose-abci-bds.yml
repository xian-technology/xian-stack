networks:
  xian-net:
    internal: false  # Allow internet access for package installation
  xian-db:
    internal: true   # Keep database isolated

services:
  postgres:
    restart: always
    image: postgres:17
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "1234"
      POSTGRES_DB: "xian"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d xian"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - ${XIAN_BDS_DATA_DIR}:/var/lib/postgresql/data
    networks:
      - xian-db
    # Explicitly disable external port mapping
    expose:
      - "5432"

  postgraphile:
    restart: always
    build:
      context: .
      dockerfile: ./docker/postgraphile.Dockerfile  
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      GRAPHILE_ENV: "development"
      POSTGRAPHILE_CONNECTION: "postgres://readonly_user:readonly@postgres:5432/xian"
      POSTGRAPHILE_SUPERUSER_CONNECTION: "postgres://postgres:1234@postgres:5432/xian"
      POSTGRAPHILE_HOST: "0.0.0.0"
      POSTGRAPHILE_PORT: "5000"
      POSTGRAPHILE_SCHEMA: "public"
      POSTGRAPHILE_RETRY_DELAY_SECONDS: "2"
    networks:
      - xian-db
      - xian-net
    ports:
      - "5000:5000"
    command: ["/usr/src/app/start-postgraphile.sh"]
